<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G7 Command Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button onclick="location.href='chat.html'" style="background:none; border:none; color:white; font-size:1.2rem; margin-right:15px;">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h3 style="color:var(--admin-gold)">COMMAND CENTER</h3>
        </div>
        
        <div id="messages" style="background:#050505;">
            <p style="color:var(--text-dim); padding:10px; font-size:0.8rem;">G7 STUDENT DIRECTORY</p>
            <div id="userListAdmin"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAILS } from './firebase-config.js';
        import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        auth.onAuthStateChanged(u => {
            if (!u || !ADMIN_EMAILS.includes(u.email)) location.href='chat.html';
        });

        onSnapshot(collection(db, "users"), snap => {
            const list = document.getElementById('userListAdmin');
            list.innerHTML = '';
            snap.forEach(u => {
                const user = u.data();
                if (ADMIN_EMAILS.includes(user.email)) return; // Hide admins

                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--card-bg); padding:15px; border-radius:10px; margin-bottom:10px;">
                        <div>
                            <p style="font-weight:bold; color:${user.isBanned ? 'red' : 'white'}">${user.name}</p>
                            <p style="font-size:0.7rem; color:var(--text-dim)">${user.dept} | ${user.level}</p>
                        </div>
                        <button class="${user.isBanned ? 'unban-btn' : 'ban-btn'}" onclick="window.toggleBan('${u.id}', ${user.isBanned})">
                            ${user.isBanned ? 'RESTORE' : 'BAN'}
                        </button>
                    </div>`;
            });
        });

        window.toggleBan = async (id, status) => {
            if(confirm("Confirm action on student?")) {
                await updateDoc(doc(db, "users", id), { isBanned: !status });
            }
        };
    </script>
</body>
</html>
