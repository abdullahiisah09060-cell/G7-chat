<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G7 Hitech | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="setup-page">
        <div class="setup-container" style="max-width: 500px; width: 95%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: var(--primary);">Admin Panel</h2>
                <button onclick="location.href='chat.html'" class="send-btn" style="width: auto; padding: 5px 15px; height: 35px; font-size: 0.8rem;">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 15px; text-align: left;">
                Manage all registered G7 students below.
            </p>

            <div id="userList" style="text-align: left; max-height: 60vh; overflow-y: auto;">
                <p style="text-align: center; color: var(--text-dim);">Loading users...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAILS } from './firebase-config.js';
        import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Security Check: Only allow the 3 Admins
        auth.onAuthStateChanged(user => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                alert("Unauthorized Access!");
                window.location.href = 'chat.html';
            }
        });

        // Real-time User Management
        onSnapshot(collection(db, "users"), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            
            snap.forEach(u => {
                const user = u.data();
                const isUserAdmin = ADMIN_EMAILS.includes(user.email);
                
                // Don't show "Ban" button for other admins (to prevent fighting lol)
                const actionButton = isUserAdmin ? 
                    `<span style="color:var(--primary); font-size:0.7rem; font-weight:bold;">OFFICIAL ADMIN</span>` : 
                    `<button class="${user.isBanned ? 'unban-btn' : 'ban-btn'}" 
                             onclick="toggleBan('${u.id}', ${user.isBanned})">
                        ${user.isBanned ? 'Unban' : 'Ban'}
                    </button>`;

                list.innerHTML += `
                    <div class="user-row" style="border-bottom: 1px solid var(--border-color); padding: 12px 0; display: flex; justify-content: space-between; align-items: center;">
                        <div style="flex: 1;">
                            <div style="font-size: 0.9rem; font-weight: 600; color: ${user.isBanned ? '#ff4d4d' : 'white'}">
                                ${user.name} ${user.isBanned ? '(BANNED)' : ''}
                            </div>
                            <div style="font-size: 0.7rem; color: var(--text-dim);">${user.dept} | ${user.level}</div>
                        </div>
                        <div>
                            ${actionButton}
                        </div>
                    </div>`;
            });
        });

        // Toggle Ban Logic
        window.toggleBan = async (id, currentStatus) => {
            const action = currentStatus ? "Unban" : "Ban";
            if(confirm(`Are you sure you want to ${action} this student?`)) {
                try {
                    await updateDoc(doc(db, "users", id), { 
                        isBanned: !currentStatus 
                    });
                } catch (e) {
                    alert("Error: " + e.message);
                }
            }
        };
    </script>
</body>
</html>
