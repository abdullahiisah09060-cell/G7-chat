<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G7 Command Center</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button onclick="location.href='chat.html'" style="background:none; border:none; color:white; font-size:1.2rem; margin-right:15px; cursor:pointer;">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h3 style="color:var(--admin-gold); letter-spacing:1px;">COMMAND CENTER</h3>
        </div>
        
        <div id="messages" style="background:#050505; flex:1; overflow-y:auto;">
            <div style="padding:15px;">
                <p style="color:var(--text-dim); font-size:0.75rem; margin-bottom:15px; text-transform:uppercase; letter-spacing:1px;">
                    Faculty Member Directory
                </p>
                <div id="userListAdmin">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAILS } from './firebase-config.js';
        import { collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Security Check: Kick out non-admins
        auth.onAuthStateChanged(u => {
            if (!u || !ADMIN_EMAILS.includes(u.email)) {
                alert("Unauthorized Access!");
                location.href='chat.html';
            }
        });

        // Listen for Users
        onSnapshot(collection(db, "users"), snap => {
            const list = document.getElementById('userListAdmin');
            list.innerHTML = '';

            let allUsers = [];
            snap.forEach(docSnap => {
                allUsers.push({ id: docSnap.id, ...docSnap.data() });
            });

            // --- SORTING LOGIC ---
            allUsers.sort((a, b) => {
                const aIsAdmin = ADMIN_EMAILS.includes(a.email);
                const bIsAdmin = ADMIN_EMAILS.includes(b.email);

                // 1. Put Admins first
                if (aIsAdmin && !bIsAdmin) return -1;
                if (!aIsAdmin && bIsAdmin) return 1;

                // 2. Then sort Alphabetically by Name
                return a.name.localeCompare(b.name);
            });

            // --- RENDER USERS ---
            allUsers.forEach(user => {
                const isAdmin = ADMIN_EMAILS.includes(user.email);
                
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background:var(--card-bg); padding:15px; border-radius:12px; margin-bottom:12px; border: 1px solid ${isAdmin ? 'var(--admin-gold)' : 'transparent'}">
                        <div>
                            <p style="font-weight:bold; color:${user.isBanned ? 'var(--red-alert)' : 'white'}; display:flex; align-items:center;">
                                ${user.name} 
                                ${isAdmin ? '<span class="admin-badge" style="margin-left:8px;">Root Admin</span>' : ''}
                            </p>
                            <p style="font-size:0.7rem; color:var(--text-dim); margin-top:4px;">
                                ${user.dept} | ${user.level}
                            </p>
                        </div>

                        ${!isAdmin ? `
                            <button class="${user.isBanned ? 'unban-btn' : 'ban-btn'}" 
                                    onclick="window.toggleBan('${user.id}', ${user.isBanned})">
                                ${user.isBanned ? '<i class="fas fa-unlock"></i> RESTORE' : '<i class="fas fa-user-slash"></i> BAN'}
                            </button>
                        ` : `
                            <span style="color:var(--admin-gold); font-size:0.8rem;"><i class="fas fa-shield-alt"></i> Protected</span>
                        `}
                    </div>`;
            });
        });

        // Toggle Ban Logic
        window.toggleBan = async (id, currentStatus) => {
            const action = currentStatus ? "Restore access for" : "BAN";
            if(confirm(`${action} this user?`)) {
                try {
                    await updateDoc(doc(db, "users", id), { 
                        isBanned: !currentStatus 
                    });
                } catch (e) {
                    alert("Error updating status. Check your connection.");
                }
            }
        };
    </script>
</body>
</html>
