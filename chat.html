<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>G7 HITECH | Global</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar-overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border);">
            <h2 style="color:var(--admin-gold)">G7 HITECH</h2>
            <button onclick="document.body.classList.toggle('dark-theme-force')" style="margin-top:10px; border:none; background:none; color:var(--text);"><i class="fas fa-moon"></i> Dark Mode</button>
        </div>
        <div id="userList" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div style="padding:20px;"><button id="logoutBtn" style="width:100%; background:#ff4444; color:white; border:none; padding:12px; border-radius:8px;">Logout</button></div>
    </div>

    <div class="chat-wrapper">
        <div class="header">
            <i class="fas fa-bars action-btn" id="menuBtn" style="color:var(--text)"></i>
            <div style="flex:1">
                <b>G7 GLOBAL HUB</b>
                <small style="display:block; color:var(--accent)">● Online Students</small>
            </div>
        </div>
        
        <div id="messages"></div>

        <div id="replyBar" style="display:none; background:var(--header); padding:10px; border-left:5px solid var(--accent);">
            <div style="display:flex; justify-content:space-between">
                <small id="repUser" style="color:var(--accent); font-weight:bold;"></small>
                <i class="fas fa-times" onclick="window.clearReply()" style="cursor:pointer; opacity:0.5"></i>
            </div>
            <div id="repText" style="font-size:0.85rem; opacity:0.7; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
        </div>

        <div class="input-area">
            <label for="fileInput" class="action-btn"><i class="fas fa-paperclip"></i></label>
            <input type="file" id="fileInput" style="display:none">
            <input type="text" id="msgInput" class="input-box" placeholder="Type a message...">
            <button id="sendBtn" class="action-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
