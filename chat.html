<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>G7 Hitech | Global</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar-overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding:20px; background:#202c33;">
            <h3 style="color:var(--whatsapp-green)">G7 Hitech Hub</h3>
            <p id="userName" style="font-size:0.8rem; margin-top:5px;"></p>
        </div>
        <div style="padding:10px; color:var(--text-dim); font-size:0.7rem; text-transform:uppercase; font-weight:bold;">Active Users (Tap to DM)</div>
        <div id="userList" style="flex:1; overflow-y:auto;"></div>
    </div>

    <div class="chat-wrapper">
        <div class="chat-header">
            <button id="openSidebar" style="background:none; border:none; color:white; font-size:1.2rem; margin-right:15px; cursor:pointer;"><i class="fas fa-bars"></i></button>
            <div>
                <span style="font-weight:600; display:block;">GLOBAL GROUP</span>
                <span style="font-size:0.6rem; color:var(--whatsapp-green)">● SYSTEM ONLINE</span>
            </div>
        </div>

        <div id="messages"></div>

        <div id="replyPreview" style="display:none; background:#1e2a32; padding:8px 15px; border-left:4px solid var(--primary);">
            <div style="font-size:0.7rem; color:var(--primary); font-weight:bold;" id="replyName"></div>
            <div style="font-size:0.8rem; color:var(--text-dim); white-space:nowrap; overflow:hidden;" id="replyText"></div>
        </div>

        <div class="input-area">
            <input type="file" id="fileInput" style="display:none">
            <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; color:var(--text-dim); font-size:1.2rem; cursor:pointer;"><i class="fas fa-paperclip"></i></button>
            <input type="text" id="msgInput" placeholder="Type message..." autocomplete="off">
            <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
