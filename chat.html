<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G7 Hitech | Global</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar-overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding:20px; background:#202c33; border-bottom: 1px solid var(--border-color);">
            <h3 style="color:var(--whatsapp-green)">G7 Hitech</h3>
            <p id="userName" style="font-size:0.8rem; color:var(--text-dim)"></p>
        </div>
        <div id="userList" style="flex:1; overflow-y:auto; padding:10px;"></div>
        <div style="padding:15px; border-top:1px solid var(--border-color);">
            <button id="logoutBtn" class="btn-logout">Logout Account</button>
        </div>
    </div>

    <div class="chat-wrapper">
        <div class="chat-header">
            <button id="openSidebar" style="background:none; border:none; color:white; font-size:1.2rem; margin-right:15px;"><i class="fas fa-bars"></i></button>
            <div>
                <span style="font-weight:600; display:block;">G7 GLOBAL HUB</span>
                <span id="onlineCount" style="font-size:0.6rem; color:var(--whatsapp-green)">Connecting...</span>
            </div>
        </div>

        <div id="messages"></div>

        <div id="replyPreview" style="display:none; background:#1e2a32; padding:10px; border-left:4px solid var(--primary);">
            <div id="replyName" style="font-size:0.7rem; color:var(--primary); font-weight:bold;"></div>
            <div id="replyText" style="font-size:0.8rem; color:var(--text-dim);"></div>
        </div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Type message..." autocomplete="off">
            <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
