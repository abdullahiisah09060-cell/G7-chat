<div class="sidebar-overlay" id="overlay"></div>
<div class="sidebar" id="sidebar">
    <div style="padding:20px; border-bottom:1px solid var(--border);">
        <h2 style="color:var(--admin-gold)">G7 HITECH</h2>
    </div>
    <div id="userList" style="flex:1; overflow-y:auto;"></div>
    <div style="padding:15px;"><button id="logoutBtn" style="width:100%; padding:10px; background:#ff4444; color:white; border:none; border-radius:5px;">Logout</button></div>
</div>

<div class="chat-wrapper">
    <div class="header">
        <i class="fas fa-bars action-btn" id="menuBtn"></i>
        <b>G7 GLOBAL HUB</b>
    </div>
    <div id="messages"></div>
    <div class="input-area">
        <label for="fileInput" class="action-btn"><i class="fas fa-image"></i></label>
        <input type="file" id="fileInput" style="display:none" accept="image/*">
        <input type="text" id="msgInput" class="input-box" placeholder="Message...">
        <button id="sendBtn" class="action-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>
