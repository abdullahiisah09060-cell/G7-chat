<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>G7 HITECH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar-overlay" id="overlay"></div>
    <div class="sidebar" id="sidebar">
        <div style="padding:20px; border-bottom:1px solid var(--border); background:var(--header)">
            <h2 style="color:var(--admin-gold)">G7 HITECH</h2>
            <small>Student Portal</small>
        </div>
        <div id="userList" style="flex:1; overflow-y:auto;"></div>
        <div style="padding:15px;"><button id="logoutBtn" style="width:100%; padding:10px; background:#ff4444; color:white; border:none; border-radius:8px;">Logout</button></div>
    </div>

    <div class="chat-wrapper">
        <div class="header">
            <i class="fas fa-bars action-btn" id="menuBtn"></i>
            <div style="flex:1"><b>G7 GLOBAL HUB</b><br><small style="color:var(--accent)">● Active Students</small></div>
        </div>
        <div id="messages"></div>
        <div id="replyBar" style="display:none; background:var(--header); padding:8px; border-left:4px solid var(--accent);">
            <small id="repUser" style="color:var(--accent); font-weight:bold;"></small>
            <div id="repText" style="font-size:0.75rem; opacity:0.6;"></div>
        </div>
        <div class="input-area">
            <label for="fileInput" class="action-btn"><i class="fas fa-image"></i></label>
            <input type="file" id="fileInput" style="display:none" accept="image/*">
            <input type="text" id="msgInput" class="input-box" placeholder="Message...">
            <button id="sendBtn" class="action-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
