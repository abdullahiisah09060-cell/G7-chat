<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G7 Hitech | Tech Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="landing-page">

    <div class="login-container">
        <div class="logo-area">
            <h1 style="color: #007bff; font-size: 2.5rem; margin-bottom: 0;">G7 Hitech</h1>
            <p style="color: #888; margin-top: 5px;">Innovation • Collaboration • Excellence</p>
        </div>

        <div class="welcome-text" style="margin: 30px 0; text-align: left;">
            <h2 style="font-size: 1.2rem;">Welcome to the Community</h2>
            <p style="font-size: 0.9rem; color: #bbb; line-height: 1.6;">
                Connect with fellow students across **Computer Science, AI, Cyber Security,** and more. 
                Share resources, chat in real-time, and grow your tech network.
            </p>
        </div>

        <button id="loginBtn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" width="20" alt="G">
            Get Started with Google
        </button>

        <div class="footer-note" style="margin-top: 20px; font-size: 0.7rem; color: #555;">
            <p>Authorized Student Access Only. <br> Powered by G7 Hitech Dev Team.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Config
        const firebaseConfig = {
            apiKey: "AIzaSyAYOaONlk9G1B4A6P0Xk_ynQ_Kd390fwDY",
            authDomain: "g7-group-chat.firebaseapp.com",
            projectId: "g7-group-chat",
            storageBucket: "g7-group-chat.firebasestorage.app",
            messagingSenderId: "484018348918",
            appId: "1:484018348918:web:4e517aec495d1d36f45057"
        };

        // Initialize
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');

        loginBtn.onclick = async () => {
            loginBtn.innerText = "Connecting...";
            loginBtn.disabled = true;

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // Check database for user profile
                const userDoc = await getDoc(doc(db, "users", user.uid));

                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    if (userData.isBanned) {
                        alert("Access Denied: Your account has been suspended by the Admin.");
                        await auth.signOut();
                        location.reload();
                    } else {
                        // User exists and not banned -> Go to Chat
                        window.location.href = "chat.html";
                    }
                } else {
                    // New User -> Go to Setup
                    window.location.href = "setup.html";
                }
            } catch (error) {
                console.error("Auth Error:", error);
                alert("Login Error: " + error.message);
                loginBtn.innerText = "Get Started with Google";
                loginBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
