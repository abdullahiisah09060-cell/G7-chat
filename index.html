<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G7 Hitech | Innovation Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Smooth Entrance Animation */
        .login-container {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="landing-page">

    <div class="login-container">
        <div class="logo-area">
            <h1 style="color: var(--primary); font-size: 2.8rem; font-weight: 700; letter-spacing: -1px;">G7 Hitech</h1>
            <p style="color: var(--text-dim); font-size: 0.85rem; letter-spacing: 3px; font-weight: 600; text-transform: uppercase;">Innovation • Excellence</p>
        </div>

        <div class="welcome-text" style="margin: 40px 0;">
            <h2 style="font-size: 1.4rem; color: #fff; margin-bottom: 10px;">Connect with the Best.</h2>
            <p style="font-size: 1rem; color: var(--text-dim); line-height: 1.6;">
                The official digital hub for <b>G7 Computer Faculty</b>. Join the conversation and build the future.
            </p>
        </div>

        <button id="loginBtn" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style="width: 22px;" alt="G">
            <span>Sign in with Google</span>
        </button>

        <div class="footer-note" style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 20px;">
            <p style="font-size: 0.75rem; color: #555;">© 2026 G7 Hitech Dev Team. <br> Authorized Student Network Only.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Secure Config
        const firebaseConfig = {
            apiKey: "AIzaSyAYOaONlk9G1B4A6P0Xk_ynQ_Kd390fwDY",
            authDomain: "g7-group-chat.firebaseapp.com",
            projectId: "g7-group-chat",
            storageBucket: "g7-group-chat.firebasestorage.app",
            messagingSenderId: "484018348918",
            appId: "1:484018348918:web:4e517aec495d1d36f45057"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');

        loginBtn.onclick = async () => {
            loginBtn.innerHTML = "Securely Connecting...";
            loginBtn.style.opacity = "0.6";
            loginBtn.disabled = true;

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                // Check if user already exists in Faculty Database
                const userDoc = await getDoc(doc(db, "users", user.uid));

                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    // ADMIN BAN CHECK
                    if (userData.isBanned) {
                        alert("🚨 ACCESS DENIED: Your account has been suspended by the Admin.");
                        await auth.signOut();
                        location.reload();
                    } else {
                        // User is clean, go to chat
                        window.location.href = "chat.html";
                    }
                } else {
                    // New user, go to setup profile
                    window.location.href = "setup.html";
                }
            } catch (error) {
                console.error("Auth Error:", error);
                alert("Connection failed. Please check your network.");
                loginBtn.innerHTML = '<img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" style="width: 22px;"> Sign in with Google';
                loginBtn.style.opacity = "1";
                loginBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
