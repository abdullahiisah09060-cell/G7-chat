<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G7 Hitech | Tech Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="landing-page">

    <div class="login-container">
        <div class="logo-area">
            <h1 style="color: var(--primary); font-size: 2.5rem; font-weight: 700; margin-bottom: 5px;">G7 Hitech</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem; letter-spacing: 2px; font-weight: 600;">INNOVATION • EXCELLENCE</p>
        </div>

        <div class="welcome-text" style="margin: 40px 0; text-align: center;">
            <h2 style="font-size: 1.3rem; margin-bottom: 12px; color: #fff;">Welcome, Techie!</h2>
            <p style="font-size: 1rem; color: var(--text-dim); line-height: 1.6;">
                The ultimate hub for <b>G7</b> students. <br>
                Connect, share, and build the future.
            </p>
        </div>

        <button id="loginBtn" class="google-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" class="google-icon" alt="G">
            Sign in with Google
        </button>

        <div class="footer-note" style="margin-top: 30px; font-size: 0.75rem; color: #666; border-top: 1px solid var(--border-color); padding-top: 20px;">
            <p>© 2026 G7 Hitech Dev Team. <br> Authorized Student Access Only.</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYOaONlk9G1B4A6P0Xk_ynQ_Kd390fwDY",
            authDomain: "g7-group-chat.firebaseapp.com",
            projectId: "g7-group-chat",
            storageBucket: "g7-group-chat.firebasestorage.app",
            messagingSenderId: "484018348918",
            appId: "1:484018348918:web:4e517aec495d1d36f45057"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('loginBtn');

        loginBtn.onclick = async () => {
            const originalContent = loginBtn.innerHTML;
            loginBtn.innerHTML = "Connecting...";
            loginBtn.style.opacity = "0.7";
            loginBtn.disabled = true;

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                const userDoc = await getDoc(doc(db, "users", user.uid));

                if (userDoc.exists()) {
                    if (userDoc.data().isBanned) {
                        alert("Access Denied: Your account is suspended.");
                        await auth.signOut();
                        location.reload();
                    } else {
                        window.location.href = "chat.html";
                    }
                } else {
                    window.location.href = "setup.html";
                }
            } catch (error) {
                console.error("Auth Error:", error);
                alert("Login failed. Check your internet.");
                loginBtn.innerHTML = originalContent;
                loginBtn.style.opacity = "1";
                loginBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
