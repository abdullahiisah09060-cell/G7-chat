<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>G7 PRIVATE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="chat-wrapper">
        <div class="header">
            <i class="fas fa-arrow-left action-btn" onclick="location.href='chat.html'"></i>
            <div style="flex:1"><b id="targetName">Loading...</b><br><small id="targetStatus">Private Chat</small></div>
        </div>
        <div id="messages"></div>
        <div id="replyBar" style="display:none;"> </div>
        <div class="input-area">
            <label for="fileInput" class="action-btn"><i class="fas fa-image"></i></label>
            <input type="file" id="fileInput" style="display:none" accept="image/*">
            <input type="text" id="msgInput" class="input-box" placeholder="Private message...">
            <button id="sendBtn" class="action-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
