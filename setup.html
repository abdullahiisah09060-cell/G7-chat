<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G7 Hitech | Setup Profile</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="setup-page">
    <div class="setup-container">
        <h2 style="margin-bottom: 10px; color: var(--primary);">Finish Setup</h2>
        <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 25px;">Tell us your department and level to continue.</p>
        
        <label style="display:block; text-align:left; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim);">Select Department</label>
        <select id="dept">
            <option value="Computer Science">Computer Science</option>
            <option value="Networking and Cloud">Networking and Cloud</option>
            <option value="Cyber Security">Cyber Security</option>
            <option value="AI">AI</option>
            <option value="Software Development">Software Development</option>
        </select>

        <label style="display:block; text-align:left; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim);">Select Level</label>
        <select id="level">
            <option value="ND1">ND1</option>
            <option value="ND2">ND2</option>
            <option value="HND1">HND1</option>
            <option value="HND2">HND2</option>
        </select>

        <button id="saveBtn" class="send-btn" style="height:50px; width:100%; border-radius: 10px; margin-top: 10px; font-size: 1rem;">
            Create Profile & Enter
        </button>
    </div>

    <script type="module">
        import { auth, db, ADMIN_EMAILS } from './firebase-config.js';
        import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const saveBtn = document.getElementById('saveBtn');

        saveBtn.onclick = async () => {
            const user = auth.currentUser;
            if(!user) return alert("Session expired. Please login again.");

            saveBtn.innerText = "Setting up...";
            saveBtn.disabled = true;

            try {
                // Check if current user email is in the admin list we set in config
                const isAdmin = ADMIN_EMAILS.includes(user.email);

                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: user.displayName,
                    email: user.email,
                    photo: user.photoURL,
                    dept: document.getElementById('dept').value,
                    level: document.getElementById('level').value,
                    isBanned: false,
                    role: isAdmin ? 'admin' : 'user',
                    createdAt: new Date()
                });

                window.location.href = "chat.html";
            } catch (error) {
                console.error("Setup Error:", error);
                alert("Error saving profile: " + error.message);
                saveBtn.innerText = "Create Profile & Enter";
                saveBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
